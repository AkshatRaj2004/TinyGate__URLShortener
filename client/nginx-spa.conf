# Nginx config embedded inside the frontend container.
# Serves the SPA and falls back to index.html for client-side routing.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve a tiny health-check file (used by Docker HEALTHCHECK)
    location = /health.txt {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Static assets — long-lived cache (Vite fingerprints them)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all unknown paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable server tokens
    server_tokens off;
}
