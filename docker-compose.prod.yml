# ═══════════════════════════════════════════════════════════════════════════════
#  Tiny Gate — PRODUCTION compose
#
#  Services:
#    nginx    — reverse proxy + SSL termination (ports 80 & 443)
#    frontend — React SPA served by Nginx (internal only)
#    backend  — Express API (internal only)
#    mongo    — MongoDB with auth (internal only)
#    certbot  — Let's Encrypt cert renewal (runs and exits)
#
#  Usage:
#    docker compose -f docker-compose.prod.yml up -d --build
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.9'

services:

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: tinygate_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Let's Encrypt certs (managed by certbot service)
      # Bind-mount so deploy.sh's standalone certbot output is visible here
      - ./nginx/ssl/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/ssl/certbot-www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - tinygate_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React frontend (internal) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Point frontend at the SAME domain (nginx handles routing)
        VITE_API_URL: https://${DOMAIN}
    image: tinygate_frontend:latest
    container_name: tinygate_frontend
    restart: unless-stopped
    expose:
      - '80'
    networks:
      - tinygate_net

  # ── Node.js backend (internal) ────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: tinygate_backend:latest
    container_name: tinygate_backend
    restart: unless-stopped
    expose:
      - '5000'
    env_file: .env.production
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - tinygate_net

  # ── MongoDB (internal, auth-enabled) ─────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: tinygate_mongo
    restart: unless-stopped
    expose:
      - '27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USER}", "-p", "${MONGO_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - tinygate_net

  # ── Certbot (auto-renew SSL) ──────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: tinygate_certbot
    volumes:
      - ./nginx/ssl/letsencrypt:/etc/letsencrypt
      - ./nginx/ssl/certbot-www:/var/www/certbot
    # Renew certificates if they are close to expiry; exits immediately
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!}; done"
    networks:
      - tinygate_net

volumes:
  mongo_data:
  mongo_config:

networks:
  tinygate_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
