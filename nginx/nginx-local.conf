# ═══════════════════════════════════════════════════════════════════════════════
#  Tiny Gate — Nginx (HTTP only, for LOCAL testing without SSL)
#  Use this config when running docker-compose locally.
# ═══════════════════════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile     on;
    gzip         on;
    gzip_types   text/plain text/css application/json application/javascript text/javascript;
    server_tokens off;

    upstream backend  { server tinygate_backend:5000; }
    upstream frontend { server tinygate_frontend:80;  }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        location /api/        { proxy_pass http://backend; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /health      { proxy_pass http://backend/health; access_log off; }

        location ~ ^/([A-Za-z0-9_-]{5,30})$ {
            proxy_pass http://backend;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}
