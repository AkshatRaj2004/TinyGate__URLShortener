# ═══════════════════════════════════════════════════════════════════════════════
#  Tiny Gate — Nginx Reverse Proxy
#
#  HTTP  (port 80)  → permanent redirect to HTTPS
#  HTTPS (port 443) → serves frontend + proxies /api/* and /:shortCode
# ═══════════════════════════════════════════════════════════════════════════════

# ── Worker settings ────────────────────────────────────────────────────────────
user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        application/vnd.ms-fontobject application/x-font-ttf
        font/opentype image/svg+xml image/x-icon;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=10r/m;

    # ── Upstream services (Docker internal DNS) ───────────────────────────────
    upstream backend {
        server tinygate_backend:5000;
        keepalive 32;
    }

    upstream frontend {
        server tinygate_frontend:80;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;

        # ── Replace with your domain ──────────────────────────────────────────
        server_name yourdomain.com www.yourdomain.com;

        # ── SSL certificates (managed by Certbot) ─────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

        # ── SSL hardening ──────────────────────────────────────────────────────
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # ── Security headers ───────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # ── Body size ─────────────────────────────────────────────────────────
        client_max_body_size 10m;

        # ── Auth API (stricter rate limit) ────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 30s;
        }

        # ── General API (standard rate limit) ────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 30s;
        }

        # ── Short-code redirects  (e.g. /xK9pQ2r) ────────────────────────────
        # Matches 5-30 char alphanumeric slugs, avoids stealing /api /health etc.
        location ~ ^/([A-Za-z0-9_-]{5,30})$ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── Health check ──────────────────────────────────────────────────────
        location = /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # ── Frontend (React SPA) ──────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Cache static assets aggressively
            proxy_cache_bypass  $http_upgrade;
        }
    }
}
